name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Web Build artifact
        uses: actions/download-artifact@v4
        with:
          pattern: chinchon-web-*.zip
          path: ./web-build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Get version from artifact name
        id: get_version
        run: |
          ARTIFACT_NAME=$(ls ./web-build/ | grep chinchon-web- | head -1)
          VERSION=$(echo $ARTIFACT_NAME | sed -n 's/chinchon-web-\(.*\)\.zip/\1/p')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Extract Web Build
        run: |
          cd ./web-build
          unzip ${{ steps.get_version.outputs.artifact }} -d ../dist

      - name: Set custom domain
        run: echo -n "chinchon.urbieta.dev" > ./dist/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
