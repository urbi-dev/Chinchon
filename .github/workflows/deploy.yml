name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get version from commit
        id: get_version
        run: |
          # Get the latest commit message from the release workflow
          COMMIT_MSG=$(git log --format=%B -n 1 HEAD)

          echo "Latest commit message: $COMMIT_MSG"

          # Extract version from commit message (format: "chore(release): 1.2.3")
          VERSION=$(echo "$COMMIT_MSG" | grep -oE 'chore\(release\): [0-9]+\.[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from commit message"
            echo "Available commits:"
            git log --oneline -3
            exit 1
          fi

          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Web Build artifact
        uses: actions/download-artifact@v4
        with:
          name: chinchon-web-${{ steps.get_version.outputs.version }}.zip
          path: ./web-build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extract Web Build
        run: |
          cd ./web-build
          unzip chinchon-web-${{ steps.get_version.outputs.version }}.zip -d ../dist

      - name: Set custom domain
        run: echo -n "chinchon.urbieta.dev" > ./dist/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
