name: Build Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Get web version from Semantic Release
        id: web_version
        run: |
          npx semantic-release --dry-run
          echo "::set-output name=version::$(node -p \"require('./package.json').version\")"

      - name: Upload Web Build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chinchon-web-${{ steps.web_version.outputs.version }}.zip
          path: build
