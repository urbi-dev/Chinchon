name: Release

on:
  push:
    branches:
      - main

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Get version from Semantic Release
        id: get_version
        run: |
          VERSION=$(npx semantic-release --dry-run | grep -oP 'Published release \K[\d.]+' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-web:
    needs: get-version
    uses: ./.github/workflows/web.yml
    with:
      version: ${{ needs.get-version.outputs.version }}

  build-android:
    needs: get-version
    uses: ./.github/workflows/android.yml
    with:
      version: ${{ needs.get-version.outputs.version }}

  release:
    needs: [build-web, build-android]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: chinchon-android-${{ needs.get-version.outputs.version }}.apk
          path: ./artifacts/android

      - name: Download Web Build artifact
        uses: actions/download-artifact@v4
        with:
          name: chinchon-web-${{ needs.get-version.outputs.version }}.zip
          path: ./artifacts/web

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release

  deploy:
    needs: [release]
    uses: ./.github/workflows/deploy.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
